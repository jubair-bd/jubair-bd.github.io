<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Status | JB Reseller</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .card { background: #fff; width: 90%; max-width: 400px; padding: 40px 20px; border-radius: 30px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.05); }
        .icon { width: 70px; height: 70px; background: #fff1f2; color: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 20px; }
        h1 { font-size: 22px; color: #0f172a; margin-bottom: 5px; font-weight: 800; }
        .clock { font-size: 40px; font-weight: 800; color: #334155; margin: 15px 0; font-family: monospace; }
        p { color: #64748b; font-size: 13px; line-height: 1.6; }
        .checking { color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div id="statusIcon" class="icon"><i class="fas fa-sync fa-spin" style="color: #3b82f6;"></i></div>
    <h1 id="statusTitle">Connecting...</h1>
    <div class="clock" id="liveClock">00:00:00</div>
    <p id="statusMsg">সার্ভারের সাথে সংযোগ স্থাপন করা হচ্ছে, দয়া করে অপেক্ষা করুন।</p>
</div>

<script>
    const targetUrl = "https://flattery-launder-promoter.ngrok-free.dev/reseller-portal.html";

    // ১. লাইভ ঘড়ি
    function updateClock() {
        document.getElementById('liveClock').innerText = new Date().toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ২. সার্ভার চেক ফাংশন
    function checkServer() {
        // fetch দিয়ে চেক করা হচ্ছে সার্ভার অনলাইন কি না
        fetch(targetUrl, { mode: 'no-cors', cache: 'no-store' })
        .then(() => {
            // যদি রেসপন্স পাওয়া যায়, তবেই রিডাইরেক্ট করবে
            window.location.href = targetUrl;
        })
        .catch(() => {
            // যদি কানেকশন ফেইল হয় (পিসি অফ থাকে), তবে অফলাইন মেসেজ দেখাবে
            document.getElementById('statusIcon').innerHTML = '<i class="fas fa-server"></i>';
            document.getElementById('statusIcon').style.background = '#fef2f2';
            document.getElementById('statusIcon').style.color = '#ef4444';
            document.getElementById('statusTitle').innerText = "সার্ভার অফলাইন আছে";
            document.getElementById('statusMsg').innerText = "আপনার পিসি বা ngrok বর্তমানে বন্ধ আছে। সার্ভার চালু হলে এই পেজটি অটোমেটিক রিলোড হবে।";
        });
    }

    // পেজ লোড হওয়ার ৫ সেকেন্ড পর চেক করবে (যাতে ব্রাউজার সেটেল হতে পারে)
    setTimeout(checkServer, 2000);

    // প্রতি ২০ সেকেন্ড পরপর অটো চেক করবে
    setInterval(checkServer, 20000);
</script>

</body>
</html>
